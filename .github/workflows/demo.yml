name: Demo — Products

on:
  workflow_dispatch:
  push:
    paths:
      - "demos/products/**"
      - "scripts/demo-products.sh"

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Create .env
        run: cp .env.example .env

      - name: Build and start stack
        run: docker compose up --build -d

      - name: Apply Products demo
        run: bash scripts/demo-products.sh

      - name: Smoke test — list products (empty)
        run: |
          curl -sf http://localhost:8000/products/ | \
            python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data == [], f'Expected [] got {data}'
          print('OK: empty list')
          "

      - name: Smoke test — create product
        run: |
          curl -sf -X POST http://localhost:8000/products/ \
            -H "Content-Type: application/json" \
            -d '{"name":"Widget","description":"Test item","price":"9.99","stock":100}' | \
            python3 -c "
          import sys, json
          p = json.load(sys.stdin)
          assert p['name'] == 'Widget', p
          assert p['stock'] == 100, p
          assert 'id' in p, p
          print(f'OK: created product id={p[\"id\"]}')
          "

      - name: Smoke test — list products (1 item)
        run: |
          curl -sf http://localhost:8000/products/ | \
            python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert len(data) == 1, f'Expected 1 item, got {len(data)}'
          assert data[0]['name'] == 'Widget', data
          print('OK: 1 product in list')
          "

      - name: Smoke test — get product by id
        run: |
          ID=$(curl -sf http://localhost:8000/products/ | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['id'])")
          curl -sf "http://localhost:8000/products/$ID" | \
            python3 -c "
          import sys, json
          p = json.load(sys.stdin)
          assert p['name'] == 'Widget', p
          print(f'OK: GET /products/{p[\"id\"]} returned Widget')
          "

      - name: Smoke test — update product
        run: |
          ID=$(curl -sf http://localhost:8000/products/ | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['id'])")
          curl -sf -X PUT "http://localhost:8000/products/$ID" \
            -H "Content-Type: application/json" \
            -d '{"name":"Updated Widget","price":"12.50","stock":50}' | \
            python3 -c "
          import sys, json
          p = json.load(sys.stdin)
          assert p['name'] == 'Updated Widget', p
          assert p['stock'] == 50, p
          print(f'OK: PUT /products/{p[\"id\"]} updated to Updated Widget')
          "

      - name: Smoke test — delete product
        run: |
          ID=$(curl -sf http://localhost:8000/products/ | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['id'])")
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE "http://localhost:8000/products/$ID")
          python3 -c "assert '$STATUS' == '204', f'Expected 204 got $STATUS'; print('OK: DELETE returned 204')"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "http://localhost:8000/products/$ID")
          python3 -c "assert '$STATUS' == '404', f'Expected 404 got $STATUS'; print('OK: product gone after delete')"

      - name: Show container logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs
