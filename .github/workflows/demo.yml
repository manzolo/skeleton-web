name: Demo — Products

on:
  workflow_dispatch:
  push:
    paths:
      - "demos/products/**"
      - "scripts/demo-products.sh"

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Create .env
        run: cp .env.example .env

      - name: Build and start stack
        run: docker compose -f docker-compose.yml up --build -d

      - name: Apply Products demo
        run: bash scripts/demo-products.sh

      - name: Smoke test — list products (empty)
        run: |
          curl -sf http://localhost:8000/products/ | \
            python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data == [], f'Expected [] got {data}'
          print('OK: empty list')
          "

      - name: Smoke test — create product
        run: |
          curl -sf -X POST http://localhost:8000/products/ \
            -H "Content-Type: application/json" \
            -d '{"name":"Widget","description":"Test item","price":"9.99","stock":100}' | \
            python3 -c "
          import sys, json
          p = json.load(sys.stdin)
          assert p['name'] == 'Widget', p
          assert p['stock'] == 100, p
          assert 'id' in p, p
          print(f'OK: created product id={p[\"id\"]}')
          "

      - name: Smoke test — list products (1 item)
        run: |
          curl -sf http://localhost:8000/products/ | \
            python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert len(data) == 1, f'Expected 1 item, got {len(data)}'
          assert data[0]['name'] == 'Widget', data
          print('OK: 1 product in list')
          "

      - name: Smoke test — get product by id
        run: |
          ID=$(curl -sf http://localhost:8000/products/ | python3 -c "import sys,json; print(json.load(sys.stdin)[0]['id'])")
          curl -sf "http://localhost:8000/products/$ID" | \
            python3 -c "
          import sys, json
          p = json.load(sys.stdin)
          assert p['name'] == 'Widget', p
          print(f'OK: GET /products/{p[\"id\"]} returned Widget')
          "

      - name: Show container logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs
